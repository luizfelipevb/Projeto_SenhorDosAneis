<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senhor dos Anéis Contato</title>
    <link rel="stylesheet" href="Lindao.css">
</head>
<body>
    <div class="titulo_principal">
        <h1>O senhor dos anéis</h1>
        <h2>Uma das trilogias mais famosas do cinema<wbr></h2>
        <nav>
            <a href="Informações.html">Informações</a>
            <a href="ordem.html">Ordem de filmes</a>
            <a href="curiosidades.html">Curiosidades</a>
            <a href="impacto.html">Impacto Cultura</a>
            <a href="contato.html">Contato</a>
        </nav>
    </div>
    <h2 class="Titulo_segundario">Contato com a Guerra Média
    </h2>
    <form action="" method="">
        <label for="nomepessoa">Nome na Terra Média:</label>
        <input type="text" name="nomepessoa"
        id="nomepessoa" minlength="3" maxlength="15"
        required placeholder="Adicione um nome da Terra Média" size="25"> <br><br>

        <label for="email">Corvo eletrônico  (Email):</label>
        <input type="email" name="email" id="email"
        required placeholder="Informe seu email de corvo eletrônico" size="27"><br><br>

        <label for="ano">Ano de nascimento:</label>
        <input type="number" id="ano" name="ano" max="2026" min="1999"
        placeholder="Informe seu ano de nascimento" style="width: 195px; padding: 1px;"><br><br>

        <fieldset>
            <legend>Qual é sua raça?</legend>

            <label>
                <input type="radio" name="raca" value="humano"> Humano
            </label>

            <label>
                <input type="radio" name="raca" value="elfo" checked> Elfo
            </label>

            <label>
                <input type="radio" name="raca" value="anao"> Anão
            </label>

            <label>
                <input type="radio" name="raca" value="hobbit"> Hobbit
            </label>
        </fieldset><br><br>

        
        <label for="filme">Escolha seu filme favorito</label>

        <select name="filme" id="filme">
            <option value="filme1">O Retorno do Rei</option>

        </select>


        <br><br><label>Telefone</label>
        <input type="tel" name="telefone" id="telefone"
        placeholder="informe seu telefone">

        <label>Informe seu github:</label>
        <input type="url" name="github" id="github" 
        placeholder="informe seu Github"> <br><br>

        <label for="senha">informe sua senha:</label>
        <input type="password" id="senha" name="senha"> <br><br>

        <label for="arquivo">anexe um arquivo:</label>
        <input type="file" id="arquivo" name="arquivo"> <br><br>

        <label for="cor">escolha uma cor:</label>
        <input type="color" id="cor" name="cor"> <br><br>

        <fieldset>
            <legend>Campos de tempo</legend>
            <label> informe a data</label>
            <input type="data" name="data" id="data"> <br><br>

            <label for="mes">Informe o mês</label>
            <input type="month" name="mes" id="mes"> <br><br>


            <label for="semana">Informe a semana</label>
            <input type="week" name="semana" id="semana"> <br><br>
            
            <label for="hora">Informe a hora</label>
            <input type="time" name="hora" id="hora"> <br><br>

            <label>Data e hora atual</label>
            <input type="datetime-local" name="datahora" id="datahora"> <br><br>

        </fieldset> 
            <label>pesquisa</label>
            <input type="search" id="pesquisa" name="pesquisa"><br><br>
            
            <label>Informe aqui oque você gosta nos filmes:</label><br><br>
            <textarea cols="50" rows="5" name="descricao" id="descricao"></textarea> <br><br>

            <fieldset>
            <legend>Qual é seu filme favorito?</legend>
            <label for="filme1">Filme 1</label>
            <input type="radio" name="filme" id="Filme1" value="filme 1">

            <label for="filme2">Filme 2</label>
            <input checked type="radio" name="filme" id="Filme2" value="filme 2">
            
            <label for="filme3">Filme 3</label>
            <input type="radio" name="filme" id="Filme3" value="filme 3">
        </fieldset>

        <fieldset>
        <select>
            <option selected value="filme 1"> Filme 1 </option>
            <option selected value="filme 2"> Filme 2 </option>
            <option selected value="filme 3"> Filme 3 </option>
        </select>
        </fieldset><br><br>

        <label for="nive">Escolha o nivel</label>
        <input type="range" max="10" min="1" id="nivel">

        <select id="lista_suspensa" name="lista">
            <optgroup label="Teste de leggenda no combobox">
                <option value="Teste 1">Teste 1</option>
                <option value="Teste 2">Teste 2</option>
                <option value="Teste 3">Teste 3</option>
                </optgroup>
            <optgroup label="Teste de leggenda no combobox 2">
                <option value="Teste 4">Teste 4</option>
                <option value="Teste 5">Teste 5</option>
                <option value="Teste 6">Teste 6</option>
            </optgroup>
        </select> <br><br>

        <fieldset>
        <legend>Desenvolvimento para internet</legend>
        <label><input type="checkbox" name="php" value="php">php</label>
        <label><input type="checkbox" name="php" value="hmtl5">HTML5</label>
        <label><input type="checkbox" name="php" value="css">CSS</label>
        <label><input type="checkbox" name="php" value="js">JAVASCRIPT</label>
        </fieldset> <br><br>

        <!--Datalist possiveis ganhadores da copa do mundo 2026-->
        <input type="paises" id="busca_datalist" list="paises">
        <datalist id="paises">
            <option>Brasil</option>
            <option>França</option>
            <option>Argentinha</option>
            <option>Alemanha</option>
            <option>Inglaterra</option>
            <option>Espanha</option>
        </datalist><br><br>

        <audio controls muted autoplay loop>
            <source src="audio/AC_DC - Thunderstruck.mp3" type="audio/mp3">
            Navegador não é compatível para executar o áudio!
        </audio> <br><br>

        <video controls autoplay loop muted poster="">
            <source src="video/leon edit.mp4" type="video/mp4">
        </video><br><br>

        <iframe width="560" height="315" src="https://www.youtube.com/embed/NTqzB7BJK8o?si=mvk0vcHe9iiqIrhq" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> <br><br>
        
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3617.498287891094!2d-53.478539!3d-24.949156000000002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94f3d15547bda185%3A0xd0cbc7fb7cc4a1a6!2sUNIPAR%20-%20Universidade%20Paranaense%20-%20Cascavel!5e0!3m2!1spt-BR!2sbr!4v1774307645529!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe> <br><br> <br><br>

        <button type="reset">limpar</button>
        <button type="submit">enviar</button>


    </form>
</body>
</html>
